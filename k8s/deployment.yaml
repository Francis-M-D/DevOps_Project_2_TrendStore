apiVersion: apps/v1
kind: Deployment
metadata:
  name: trend-store-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trend
  template:
    metadata:
      labels:
        app: trend
    spec:
      containers:
      - name: trend
        image: ghostatdocker/trendstore-image:latest
        ports:
        - containerPort: 3000
